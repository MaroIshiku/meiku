services:
  ish-contact:
    image: ghcr.io/maroishiku/ish-contact:latest
    container_name: ish-contact
    restart: unless-stopped
    environment:
      DV2_SHARED_SECRET: ${DV2_SHARED_SECRET:?set DV2_SHARED_SECRET in .env}
      DV2_DATA_FILE: /data/data.json
      DV2_PORT: 8080
    ports:
      - "${ISH_CONTACT_PORT:-8080}:8080"
    volumes:
      - ish_contact_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ish_contact_data:
