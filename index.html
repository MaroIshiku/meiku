<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>Datello</title>
  <link rel="manifest" href="manifest.json?v=datello-20260626">

</head>
<body data-theme="lavendel" data-mode="auto">
  <noscript>Diese App braucht JavaScript, weil Verschlüsselung und QR-Codes komplett lokal laufen.</noscript>

  <main id="app" class="app-shell" aria-live="polite">
    <section id="authScreen" class="auth-screen">
      <div class="auth-card glass-card">
        <div class="login-lockup" aria-label="Datello Profile Share">
          <img src="assets/datello-logo-20260626.png" alt="" class="login-logo" width="72" height="72">
          <span class="brand-text"><b>Datello</b><small>Profile Share</small></span>
        </div>
        <p class="eyebrow auth-badge">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10V8a5 5 0 0 1 10 0v2h1a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h1Zm2 0h6V8a3 3 0 0 0-6 0v2Zm3 4a2 2 0 0 0-1 3.73V19h2v-1.27A2 2 0 0 0 12 14Z"/></svg>
          <span>Verschlüsselter Tresor</span>
        </p>
        <h1 id="authTitle">Datello</h1>
        <p id="authHint" class="muted">Lade verschlüsselten Token…</p>

        <form id="passwordLogin" class="stack hidden" autocomplete="current-password">
          <label class="field auth-password-field">
            <span>Master-Passwort</span>
            <span class="password-shell">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10V8a5 5 0 0 1 10 0v2h1a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h1Zm2 0h6V8a3 3 0 0 0-6 0v2Z"/></svg>
              <input id="masterPassword" type="password" autocomplete="current-password" inputmode="text" placeholder="Master-Passwort eingeben" required>
              <button id="masterPasswordToggle" class="password-toggle" type="button" aria-label="Master-Passwort anzeigen" aria-pressed="false">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5c5 0 8.7 4.6 9.8 6.1a1.5 1.5 0 0 1 0 1.8C20.7 14.4 17 19 12 19s-8.7-4.6-9.8-6.1a1.5 1.5 0 0 1 0-1.8C3.3 9.6 7 5 12 5Zm0 3.1a3.9 3.9 0 1 0 0 7.8 3.9 3.9 0 0 0 0-7.8Zm0 2a1.9 1.9 0 1 1 0 3.8 1.9 1.9 0 0 1 0-3.8Z"/></svg>
              </button>
            </span>
          </label>
          <button class="btn primary unlock-btn" type="submit">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10V8a5 5 0 0 1 10 0v2h1a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h1Zm2 0h6V8a3 3 0 0 0-6 0v2Z"/></svg>
            <span>Entsperren</span>
          </button>
        </form>

        <form id="setupForm" class="stack hidden" autocomplete="off">
          <div class="setup-grid" id="setupFields"></div>
          <label class="field">
            <span>Neues Master-Passwort</span>
            <input id="setupPassword" type="password" autocomplete="new-password" minlength="8" required>
          </label>
          <label class="field">
            <span>Server-Secret</span>
            <input id="setupSecret" type="password" autocomplete="off" required>
          </label>
          <button class="btn primary" type="submit">Tresor anlegen & Profil starten</button>
        </form>

        <div id="quickUnlock" class="quick-unlock hidden">
          <button id="pinOpen" class="btn tonal pin-unlock-btn" type="button"><span aria-hidden="true">•••</span>Mit PIN entsperren</button>
          <button id="passkeyLogin" class="btn tonal" type="button">Mit Passkey entsperren</button>
        </div>

        <div id="pinPad" class="pin-pad hidden" aria-label="PIN-Pad">
          <div class="pin-dots" id="pinDots" aria-hidden="true"></div>
          <div class="pin-grid"></div>
          <button id="pinCancel" class="btn ghost" type="button">Abbrechen</button>
        </div>
      </div>
      <p class="auth-footnote"><span aria-hidden="true">●</span> Lokal und sicher auf diesem Gerät.</p>
    </section>

    <section id="vaultScreen" class="vault hidden">
      <header class="hero top-app-bar">
        <div class="brand-lockup" aria-label="Datello Profile Share">
          <img src="assets/datello-logo-20260626.png" alt="" width="48" height="48">
          <span class="brand-text"><b>Datello</b><small>Profile Share</small></span>
        </div>
        <div class="hero-actions">
          <button id="settingsBtn" class="icon-btn" type="button" aria-label="Einstellungen öffnen">⚙</button>
        </div>
        <div class="hero-content">
          <button class="avatar-wrap avatar-button" id="heroAvatarWrap" type="button" aria-label="Profil & Einstellungen Ã¶ffnen"><img id="heroAvatar" alt="Profilbild" hidden><span id="heroInitials">DT</span></button>
          <p class="eyebrow">Datello</p>
          <h1 id="heroName">—</h1>
          <p id="updatedAt" class="updated">Noch nicht gespeichert</p>
        </div>
      </header>

      <section id="tabContent" class="content-card" tabindex="-1"></section>

      <nav class="bottom-nav" aria-label="Hauptnavigation">
        <button data-tab="privat" class="active" type="button"><span>👤</span><b>Privat</b></button>
        <button data-tab="firma" type="button"><span>🏢</span><b>Firma</b></button>
        <button data-tab="paypal" type="button"><span>💸</span><b>PayPal</b></button>
        <button data-tab="bank" type="button"><span>🏦</span><b>Bank</b></button>
      </nav>
    </section>
  </main>

  <div id="qrOverlay" class="qr-overlay hidden" role="dialog" aria-modal="true" aria-label="QR-Code Vollbild">
    <button id="qrClose" class="icon-btn close" type="button" aria-label="QR-Code schließen">×</button>
    <div id="qrBig" class="qr-big"></div>
  </div>

  <section id="sheet" class="sheet hidden" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet-scrim" data-close-sheet></div>
    <div class="sheet-panel">
      <div class="grabber"></div>
      <h2 id="sheetTitle"></h2>
      <div id="sheetBody"></div>
    </div>
  </section>

  <div id="toast" class="toast hidden" role="status"></div>

  <script type="module" src="js/app.js?v=datello-20260626"></script>
</body>
</html>
