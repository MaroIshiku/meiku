<!doctype html>
<html lang="en" data-theme="lavender" data-mode="system" data-resolved-mode="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#FFFBFF">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#15121A">
  <title>Meiku - Profile Share</title>
  <link rel="manifest" href="manifest.json?v=meiku-20260629">
  <link rel="icon" href="assets/meiku-favicon-20260629.png" sizes="64x64">
  <link rel="icon" href="assets/meiku-icon-192-20260629.png" sizes="192x192">
  <link rel="apple-touch-icon" href="assets/meiku-icon-192-20260629.png">
  <link rel="stylesheet" href="css/meiku.css?v=meiku-20260629">
</head>
<body data-theme="lavender" data-mode="system">
  <noscript>This app needs JavaScript because encryption and QR codes run locally.</noscript>

  <main id="app" class="app-shell" aria-live="polite">
    <section id="authScreen" class="auth-screen">
      <div class="auth-card glass-card">
        <div class="login-lockup" aria-label="Meiku Profile Share">
          <img src="assets/meiku-logo-20260629.png" alt="" class="login-logo" width="72" height="72">
          <span class="brand-text"><b>Meiku</b><small>Profile Share</small></span>
        </div>
        <p class="eyebrow auth-badge">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10V8a5 5 0 0 1 10 0v2h1a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h1Zm2 0h6V8a3 3 0 0 0-6 0v2Zm3 4a2 2 0 0 0-1 3.73V19h2v-1.27A2 2 0 0 0 12 14Z"/></svg>
          <span>Encrypted Vault</span>
        </p>
        <h1 id="authTitle">Meiku</h1>
        <p id="authHint" class="muted">Loading encrypted token...</p>

        <form id="passwordLogin" class="stack hidden" autocomplete="current-password">
          <label class="field auth-password-field">
            <span>Master Password</span>
            <span class="password-shell">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10V8a5 5 0 0 1 10 0v2h1a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h1Zm2 0h6V8a3 3 0 0 0-6 0v2Z"/></svg>
              <input id="masterPassword" type="password" autocomplete="current-password" inputmode="text" placeholder="Enter master password" required>
              <button id="masterPasswordToggle" class="password-toggle" type="button" aria-label="Show master password" aria-pressed="false">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5c5 0 8.7 4.6 9.8 6.1a1.5 1.5 0 0 1 0 1.8C20.7 14.4 17 19 12 19s-8.7-4.6-9.8-6.1a1.5 1.5 0 0 1 0-1.8C3.3 9.6 7 5 12 5Zm0 3.1a3.9 3.9 0 1 0 0 7.8 3.9 3.9 0 0 0 0-7.8Zm0 2a1.9 1.9 0 1 1 0 3.8 1.9 1.9 0 0 1 0-3.8Z"/></svg>
              </button>
            </span>
          </label>
          <button class="btn primary unlock-btn" type="submit">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10V8a5 5 0 0 1 10 0v2h1a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h1Zm2 0h6V8a3 3 0 0 0-6 0v2Z"/></svg>
            <span>Unlock</span>
          </button>
        </form>

        <form id="setupForm" class="stack hidden" autocomplete="off">
          <div class="setup-grid" id="setupFields"></div>
          <label class="field">
            <span>New Master Password</span>
            <input id="setupPassword" type="password" autocomplete="new-password" minlength="8" required>
          </label>
          <label class="field">
            <span>Server Secret</span>
            <input id="setupSecret" type="password" autocomplete="off" required>
          </label>
          <button class="btn primary" type="submit">Create Vault and Start Profile</button>
        </form>

        <div id="quickUnlock" class="quick-unlock hidden">
          <button id="pinOpen" class="btn tonal pin-unlock-btn" type="button"><span aria-hidden="true">...</span>Unlock with PIN</button>
          <button id="passkeyLogin" class="btn tonal" type="button">Unlock with Passkey</button>
        </div>

        <div id="pinPad" class="pin-pad hidden" aria-label="PIN-Pad">
          <div class="pin-dots" id="pinDots" aria-hidden="true"></div>
          <div class="pin-grid"></div>
          <button id="pinCancel" class="btn ghost" type="button">Cancel</button>
        </div>
      </div>
      <p class="auth-footnote">Local and secure on this device.</p>
    </section>

    <section id="vaultScreen" class="vault hidden">
      <header class="hero top-app-bar">
        <div class="brand-lockup" aria-label="Meiku Profile Share">
          <span class="app-symbol">
            <img src="assets/meiku-logo-20260629.png" alt="" width="42" height="42">
            <svg data-logo-fallback viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h10a4 4 0 0 1 4 4v12H9a4 4 0 0 1-4-4V4Zm3 3v9a1 1 0 0 0 1 1h7V8a1 1 0 0 0-1-1H8Zm2 2h4v2h-4V9Zm0 4h5v2h-5v-2Z"/></svg>
          </span>
          <span class="brand-text"><b>Meiku</b><small>Profile Share</small></span>
        </div>
        <div class="hero-content">
          <button class="avatar-wrap avatar-button" id="heroAvatarWrap" type="button" aria-label="Open profile and settings"><img id="heroAvatar" alt="Profile picture" hidden><span id="heroInitials">MK</span></button>
          <p class="eyebrow">Meiku</p>
          <h1 id="heroName">-</h1>
          <p id="updatedAt" class="updated">Not saved yet</p>
        </div>
      </header>

      <section id="tabContent" class="content-card" tabindex="-1"></section>

      <nav class="bottom-nav" aria-label="Main navigation">
        <button data-tab="privat" class="active" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm-7 8a7 7 0 0 1 14 0v1H5v-1Z"/></svg>
          <b>Private</b>
        </button>
        <button data-tab="firma" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 4h6a2 2 0 0 1 2 2v2h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2h2V6a2 2 0 0 1 2-2Zm0 4h6V6H9v2Zm2 7H5v4h14v-4h-6v2h-2v-2Zm8-2v-3H5v3h6v-1h2v1h6Z"/></svg>
          <b>Company</b>
        </button>
        <button data-tab="payment" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2h-2V6H6v2h14a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a4 4 0 0 1-4-4V8a2 2 0 0 1 2-2Zm2 4a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h14v-8H6Zm10 3h3v2h-3v-2Z"/></svg>
          <b>Payments</b>
        </button>
      </nav>
    </section>
  </main>

  <div id="qrOverlay" class="qr-overlay hidden" role="dialog" aria-modal="true" aria-label="Fullscreen QR code">
    <button id="qrClose" class="icon-btn close" type="button" aria-label="Close QR code">x</button>
    <div id="qrBig" class="qr-big"></div>
  </div>

  <section id="sheet" class="sheet hidden" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet-scrim" data-close-sheet></div>
    <div class="sheet-panel">
      <div class="grabber"></div>
      <h2 id="sheetTitle"></h2>
      <div id="sheetBody"></div>
    </div>
  </section>

  <div id="toast" class="toast hidden" role="status"></div>

  <script type="module" src="js/app.js?v=meiku-20260629"></script>
</body>
</html>
