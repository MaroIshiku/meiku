name: Publish GHCR image

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write build info
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          from datetime import datetime, timezone

          sha = os.environ["GITHUB_SHA"]
          repo_updated_at = subprocess.check_output(
              ["git", "show", "-s", "--format=%cI", sha],
              text=True,
          ).strip()
          info = {
              "app": "Meiku - Profile Share",
              "buildSha": sha,
              "repoUpdatedAt": repo_updated_at,
              "builtAt": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
              "sourceRepo": os.environ["GITHUB_REPOSITORY"],
              "sourceRef": os.environ["GITHUB_REF_NAME"],
              "workflowRun": os.environ["GITHUB_RUN_ID"],
              "forkRepos": [],
          }
          with open("build-info.json", "w", encoding="utf-8") as handle:
              json.dump(info, handle, ensure_ascii=False, indent=2)
              handle.write("\n")
          PY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/maroishiku/meiku
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
